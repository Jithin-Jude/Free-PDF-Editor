name: Build Signed Android App Bundle

on:
  push:
    branches: [ "main" ] # Triggers whenever you push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        validate-wrappers: false

    # Decodes your keystore file from the GitHub Secret back into a physical file
    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

    # Builds the release version of the App Bundle using the verified Gradle environment
    - name: Build Release AAB
      run: gradle bundleRelease
      env:
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # Uploads the final .aab file so you can download it directly from GitHub
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-app-bundle
        path: app/build/outputs/bundle/release/*.aab
